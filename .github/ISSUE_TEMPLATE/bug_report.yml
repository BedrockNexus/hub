name: Bug report
description: Report a reproducible problem in Bedrock Nexus Hub
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, private moderation reports, or user data.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Explain the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: "1. Go to...\n2. Select...\n3. See..."
    validations:
      required: true
  - type: input
    id: route
    attributes:
      label: Route or feature
      placeholder: /servers or project version uploads
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, device, branch or commit, and self-hosted or bedrocknexus.com.
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Remove credentials, tokens, email addresses, and private data.
