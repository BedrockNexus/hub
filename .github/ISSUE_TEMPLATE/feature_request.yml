name: Feature request
description: Propose a focused improvement to Bedrock Nexus Hub
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or workflow limitation should be solved?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the smallest useful solution and who benefits.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: scope
    attributes:
      label: Scope and risks
      description: Note lifecycle, permissions, moderation, storage, or migration effects.
