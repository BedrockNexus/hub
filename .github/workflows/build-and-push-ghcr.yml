name: Build and push (GHCR)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: ghcr-prod
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate required build variables
        env:
          CONVEX_DEPLOYMENT: ${{ vars.CONVEX_DEPLOYMENT }}
          NEXT_PUBLIC_CONVEX_URL: ${{ vars.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_CONVEX_SITE_URL: ${{ vars.NEXT_PUBLIC_CONVEX_SITE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          SITE_URL: ${{ vars.SITE_URL }}
          BEDROCKNEXUS_API_URL: ${{ vars.BEDROCKNEXUS_API_URL }}
        run: |
          missing=0
          for name in \
            CONVEX_DEPLOYMENT \
            NEXT_PUBLIC_CONVEX_URL \
            NEXT_PUBLIC_CONVEX_SITE_URL \
            NEXT_PUBLIC_SITE_URL \
            NEXT_PUBLIC_API_URL \
            SITE_URL \
            BEDROCKNEXUS_API_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub Environment variable: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Validation failed. Set missing vars in the prod GitHub Environment."
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod
          build-args: |
            CONVEX_DEPLOYMENT=${{ vars.CONVEX_DEPLOYMENT }}
            NEXT_PUBLIC_CONVEX_URL=${{ vars.NEXT_PUBLIC_CONVEX_URL }}
            NEXT_PUBLIC_CONVEX_SITE_URL=${{ vars.NEXT_PUBLIC_CONVEX_SITE_URL }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            SITE_URL=${{ vars.SITE_URL }}
            BEDROCKNEXUS_API_URL=${{ vars.BEDROCKNEXUS_API_URL }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
